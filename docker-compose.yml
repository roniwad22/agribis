version: "3.8"

services:
  agribis:
    build: .
    container_name: agribis
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - agribis-data:/data
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/agribis.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/prices"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  agribis-data:
    driver: local
